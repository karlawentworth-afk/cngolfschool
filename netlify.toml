# Netlify configuration for The Navarino Golf School site
# No build step - just serve the root folder.

[build]
  publish = "."

# Sensible security headers for a static marketing site
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Belt-and-braces noindex on the confidential pages
# in addition to the in-page meta robots tag
[[headers]]
  for = "/partnership.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/board.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Cache fonts and static assets for a year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
